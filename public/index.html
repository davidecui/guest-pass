<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GuestPass - WiFi Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .glass {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
        }

        /* Print Styles */
        @media print {
            body {
                background: none;
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
                margin: 0;
            }
            #app-container {
                display: none;
            }
            #print-area {
                display: block !important;
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                width: 100%;
                max-width: 400px;
            }
            .no-print {
                display: none !important;
            }
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">

    <!-- Main App Container -->
    <div id="app-container" class="glass rounded-2xl p-8 w-full max-w-md text-white transition-all duration-500">
        <h1 class="text-3xl font-bold mb-2 text-center">GuestPass</h1>
        <p class="text-center text-gray-200 mb-8 text-sm">Create a WiFi QR Code for your guests</p>

        <form id="wifi-form" class="space-y-6">
            <div>
                <label class="block text-sm font-medium mb-1 ml-1">Network Name (SSID)</label>
                <input type="text" id="ssid" required 
                    class="w-full px-4 py-3 rounded-xl bg-white/10 border border-white/20 focus:outline-none focus:ring-2 focus:ring-white/50 text-white placeholder-gray-300 backdrop-blur-sm transition"
                    placeholder="e.g. MyHomeWiFi">
            </div>
            
            <div>
                <label class="block text-sm font-medium mb-1 ml-1">Password</label>
                <input type="password" id="password" required 
                    class="w-full px-4 py-3 rounded-xl bg-white/10 border border-white/20 focus:outline-none focus:ring-2 focus:ring-white/50 text-white placeholder-gray-300 backdrop-blur-sm transition"
                    placeholder="••••••••">
            </div>

            <button type="submit" 
                class="w-full py-3 bg-white/90 hover:bg-white text-indigo-900 font-bold rounded-xl shadow-lg transform transition hover:scale-[1.02] active:scale-95">
                Generate Pass
            </button>
        </form>
    </div>

    <!-- Hidden Print Area (Visible only after generation & in print mode) -->
    <div id="print-area" class="hidden">
        <div class="border-4 border-black p-8 rounded-xl text-center shadow-none bg-white text-black max-w-sm mx-auto">
            <h2 class="text-4xl font-bold mb-4 uppercase tracking-wider">Wi-Fi Guest Access</h2>
            <div class="bg-black text-white py-2 px-4 rounded-full inline-block mb-6 font-mono text-lg" id="card-ssid"></div>
            
            <div class="flex justify-center mb-6">
                <img id="qr-code" src="" alt="WiFi QR Code" class="w-64 h-64 border-2 border-gray-200 rounded-lg p-2">
            </div>

            <p class="text-gray-600 mb-2">Scan to connect</p>
            <div class="text-xs text-gray-400 mt-4 border-t pt-4">Generated by GuestPass</div>
        </div>

        <div class="text-center mt-8 no-print">
            <button onclick="window.print()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-6 rounded-lg shadow transition">
                Print Card
            </button>
            <button onclick="resetApp()" class="ml-4 text-gray-600 hover:text-gray-800 underline">
                Create Another
            </button>
        </div>
    </div>

    <script>
        document.getElementById('wifi-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const ssid = document.getElementById('ssid').value;
            const password = document.getElementById('password').value;
            const btn = e.target.querySelector('button');
            const originalText = btn.innerText;

            try {
                btn.innerText = 'Generating...';
                btn.disabled = true;

                const response = await fetch('/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ssid, password })
                });

                if (!response.ok) throw new Error('Generation failed');

                const data = await response.json();
                
                // Update UI
                document.getElementById('qr-code').src = data.qr_image;
                document.getElementById('card-ssid').innerText = ssid;
                
                // Switch views
                document.getElementById('app-container').classList.add('hidden');
                document.getElementById('print-area').classList.remove('hidden');

            } catch (err) {
                alert('Error generating QR code: ' + err.message);
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
            }
        });

        function resetApp() {
            document.getElementById('wifi-form').reset();
            document.getElementById('print-area').classList.add('hidden');
            document.getElementById('app-container').classList.remove('hidden');
        }
    </script>
</body>
</html>
